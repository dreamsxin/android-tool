<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spine Resource Player</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ANDROID TOOL / SPINE 3.8</p>
          <h1>Resource Player</h1>
        </div>
        <div id="runtime-status" class="status-chip status-loading">Loading runtime</div>
      </header>

      <section class="workspace" aria-label="Spine resource player">
        <aside class="sidebar">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">LIBRARY</p>
              <h2>Animation Assets</h2>
            </div>
            <span id="animation-count" class="count-label">0</span>
          </div>
          <div class="search-control">
            <label class="sr-only" for="animation-search">Filter animation names</label>
            <input id="animation-search" type="search" placeholder="Filter animation names" autocomplete="off" />
          </div>
          <div id="animation-list" class="animation-list" role="listbox" aria-label="Animation list"></div>
          <dl id="asset-summary" class="asset-summary">
            <div><dt>Bundles</dt><dd>-</dd></div>
            <div><dt>Skeleton</dt><dd>-</dd></div>
            <div><dt>Textures</dt><dd>-</dd></div>
          </dl>
          <p id="error-message" class="error-message" role="alert"></p>
        </aside>

        <section class="viewer-panel">
          <div class="stage-toolbar">
            <span id="bundle-label">No bundle loaded</span>
            <span><span id="fps-label">-- FPS</span><span class="toolbar-divider">/</span><span id="duration-label">--</span></span>
          </div>
          <div class="stage-wrap">
            <canvas id="stage" aria-label="Spine animation canvas"></canvas>
            <div id="stage-empty" class="stage-empty">Select an animation asset to preview</div>
          </div>
          <footer class="transport-bar" aria-label="Animation controls">
            <div class="transport-main">
              <select id="action-select" class="action-select" aria-label="Action" disabled></select>
              <button id="play-button" class="primary-button" type="button" disabled>Play</button>
              <button id="reset-button" type="button" disabled>Reset</button>
              <label class="loop-control">
                <input id="loop-toggle" type="checkbox" checked />
                <span>Loop</span>
              </label>
            </div>
            <div class="timeline-row">
              <output id="time-value">0.00s</output>
              <input id="time-range" type="range" min="0" max="1" step="0.001" value="0" disabled aria-label="Animation timeline" />
              <output id="duration-value">0.00s</output>
            </div>
            <div class="transport-options">
              <label for="speed-range">Speed <output id="speed-value">1.00x</output></label>
              <input id="speed-range" type="range" min="0.25" max="2" step="0.05" value="1" />
              <label for="scale-range">Zoom <output id="scale-value">1.00x</output></label>
              <input id="scale-range" type="range" min="0.25" max="2.5" step="0.05" value="1" />
            </div>
          </footer>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
